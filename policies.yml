apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: api-retry-policy
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: api-route
  retry:
    numRetries: 3
    perRetry:
      timeout: 1s
      backOff:
        baseInterval: 200ms
        maxInterval: 2s
    retryOn:
      httpStatusCodes:
      - 500
      - 503
      triggers:
      - "5xx"
      - "reset"
      - "connect-failure"

---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: BackendTrafficPolicy
metadata:
  name: test-rate-limit-policy
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    name: test-route
  rateLimit:
    type: Local
    local:
      rules:
      - limit:
          requests: 10
          unit: Minute
